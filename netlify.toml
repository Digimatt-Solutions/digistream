[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NITRO_PRESET = "netlify"
  # Node 22+ ships a native WebSocket, which Supabase realtime requires
  # when a serverless build initializes the JS client. Older versions crash
  # with "Node.js detected but native WebSocket not found".
  NODE_VERSION = "22"

# Nitro's Netlify preset emits serverless functions into .netlify/functions-internal
# and static assets into dist. The redirects below are handled by the preset's
# generated _redirects file inside dist, so no extra rules are needed here.
